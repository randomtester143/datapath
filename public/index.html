<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datapath</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --text: #18181b;
            --primary: #000000;
            --border: #e4e4e7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            resize: none;
            box-sizing: border-box;
            font-family: monospace;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .links {
            margin-top: 2rem;
            display: none;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .link-group {
            margin-bottom: 1rem;
        }

        .link-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
        }

        .input-row input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
            background: var(--bg);
            color: var(--text);
        }

        .input-row button {
            width: auto;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Datapath</h1>
        <textarea id="text" placeholder="Paste sensitive data here."></textarea>

        <div class="input-group">
            <input type="password" id="key" placeholder="Access Key (Required)">
            <input type="text" id="customId" placeholder="Custom ID (Max 5)" maxlength="5">
        </div>

        <div class="controls">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" id="stealth" checked>
                5-Minute TTL (Stealth)
            </label>
        </div>

        <button id="shareBtn">Protect & Share</button>

        <div id="links" class="links">
            <div class="link-group">
                <label>Browser Link</label>
                <div class="input-row">
                    <input type="text" id="browserLink" readonly>
                    <button onclick="copyToClipboard('browserLink')">Copy</button>
                </div>
            </div>
            <div class="link-group">
                <label>Terminal / API Endpoint</label>
                <div class="input-row">
                    <input type="text" id="rawLink" readonly>
                    <button onclick="copyToClipboard('rawLink')">Copy</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>

</html>
