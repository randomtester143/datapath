<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Datapath</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        textarea,
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
            background: #fafafa;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        textarea:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #007aff;
            background: #fff;
        }

        textarea {
            height: 100px;
            resize: none;
            font-family: monospace;
            font-size: 14px;
        }

        .slider-group {
            background: #fafafa;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .slider-header label {
            font-weight: 600;
            font-size: 14px;
        }

        .slider-value {
            font-size: 14px;
            color: #007aff;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            accent-color: #007aff;
        }

        .preview-text {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 8px;
            text-align: right;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: #000;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.85;
        }

        button:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #ff3b30;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
            text-align: center;
            background: #ffe5e5;
            padding: 12px;
            border-radius: 10px;
        }

        .links {
            margin-top: 24px;
            display: none;
            padding-top: 20px;
            border-top: 1px solid #e5e5ea;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-group {
            margin-bottom: 16px;
        }

        .link-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #8e8e93;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            font-family: monospace;
            font-size: 13px;
            color: #1c1c1e;
            background: #f5f5f7;
            border-color: #e5e5ea;
            padding: 12px;
        }

        .input-row button {
            width: auto;
            margin-top: 0;
            padding: 0 16px;
            background: #f2f2f7;
            color: #007aff;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Datapath</h1>

        <div id="errorBox" class="error-msg"></div>

        <div class="input-group">
            <textarea id="text" placeholder="Paste sensitive data here..."></textarea>
        </div>

        <div class="input-group" style="display: flex; gap: 12px;">
            <input type="password" id="key" placeholder="Access Key" style="flex: 2;">
            <input type="text" id="customId" placeholder="Custom ID" maxlength="5" style="flex: 1;">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>Number of Views</label>
                <div id="viewsValue" class="slider-value">1 view</div>
            </div>
            <input type="range" id="viewsSlider" min="1" max="5" value="1" />
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>Expiry Time</label>
                <div id="expiryValue" class="slider-value">1 hour</div>
            </div>
            <input type="range" id="expirySlider" min="1" max="48" value="1" />
            <div id="expiryPreview" class="preview-text"></div>
        </div>

        <button id="shareBtn">Protect & Share</button>

        <div id="links" class="links">
            <div class="link-group">
                <label>Browser Link</label>
                <div class="input-row">
                    <input type="text" id="browserLink" readonly>
                    <button onclick="copyToClipboard('browserLink')">Copy</button>
                </div>
            </div>
            <div class="link-group">
                <label>Terminal / API Endpoint</label>
                <div class="input-row">
                    <input type="text" id="rawLink" readonly>
                    <button onclick="copyToClipboard('rawLink')">Copy</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>

</html>
