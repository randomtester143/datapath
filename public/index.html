<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Datapath</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1c1c1e;
            --muted: #8e8e93;
            --border: #e5e5ea;
            --field: #fafafa;
            --accent: #007aff;
            --danger: #ff3b30;
            --danger-bg: #ffe5e5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin: 0 0 24px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        textarea,
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--field);
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s, background 0.2s;
        }

        textarea:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
        }

        textarea {
            height: 100px;
            resize: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
            font-size: 14px;
        }

        .slider-group {
            background: var(--field);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .slider-header label {
            font-weight: 600;
            font-size: 14px;
        }

        .slider-value {
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            accent-color: var(--accent);
        }

        .preview-text {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
            text-align: right;
            min-height: 1em;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: #000;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.85;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: var(--danger);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
            text-align: center;
            background: var(--danger-bg);
            padding: 12px;
            border-radius: 10px;
        }

        .links {
            margin-top: 24px;
            display: none;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-group {
            margin-bottom: 16px;
        }

        .link-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            border-color: var(--border);
            padding: 12px;
        }

        .input-row button {
            width: auto;
            margin-top: 0;
            padding: 0 16px;
            background: #f2f2f7;
            color: var(--accent);
            border-radius: 10px;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Datapath</h1>

        <div id="errorBox" class="error-msg" role="alert"></div>

        <div class="input-group">
            <textarea id="text" placeholder="Paste sensitive data here..." autocomplete="off"
                spellcheck="false"></textarea>
        </div>

        <div class="input-group row">
            <input type="password" id="key" placeholder="Access Key (min 4 chars)" minlength="4" style="flex: 2;"
                autocomplete="off" spellcheck="false">
            <input type="text" id="customId" placeholder="Custom ID" maxlength="5" style="flex: 1;" autocomplete="off"
                spellcheck="false" pattern="[a-zA-Z0-9]{1,5}">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label for="viewsSlider">Number of Views</label>
                <div id="viewsValue" class="slider-value">1 view</div>
            </div>
            <input type="range" id="viewsSlider" min="1" max="5" value="1" />
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label for="expirySlider">Expiry Time</label>
                <div id="expiryValue" class="slider-value">1 hour</div>
            </div>
            <input type="range" id="expirySlider" min="1" max="48" value="1" />
            <div id="expiryPreview" class="preview-text"></div>
        </div>

        <button id="shareBtn" type="button">Protect &amp; Share</button>
        <div class="hint">Tip: press Cmd/Ctrl+Enter to share.</div>

        <div id="links" class="links">
            <div class="link-group">
                <label for="browserLink">Browser Link</label>
                <div class="input-row">
                    <input type="text" id="browserLink" readonly>
                    <button type="button" data-copy-target="browserLink">Copy</button>
                </div>
            </div>
            <div class="link-group">
                <label for="rawLink">Terminal / API Endpoint</label>
                <div class="input-row">
                    <input type="text" id="rawLink" readonly>
                    <button type="button" data-copy-target="rawLink">Copy</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>

</html>
