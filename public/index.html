<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Datapath</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --text: #18181b;
            --primary: #000000;
            --border: #e4e4e7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 0.875rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            resize: none;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .row {
            display: flex;
            gap: 0.5rem;
        }

        .row>* {
            flex: 1;
        }

        input,
        select {
            padding: 0.875rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            width: 100%;
            background: #fff;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .error-msg {
            color: #d93025;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            font-weight: 600;
        }

        .links {
            margin-top: 1.5rem;
            display: none;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .link-group {
            margin-bottom: 1rem;
        }

        .link-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
        }

        .input-row input {
            flex: 1;
            font-family: monospace;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }

        .input-row button {
            width: auto;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Datapath</h1>

        <div id="errorBox" class="error-msg"></div>

        <textarea id="text" placeholder="Paste sensitive data here."></textarea>

        <div class="input-group">
            <input type="password" id="key" placeholder="Access Key (Required)">
            <div class="row">
                <input type="text" id="customId" placeholder="Custom ID (Max 5)" maxlength="5">
                <select id="maxViews">
                    <option value="1">1 View</option>
                    <option value="2">2 Views</option>
                    <option value="3">3 Views</option>
                    <option value="4">4 Views</option>
                    <option value="5">5 Views</option>
                </select>
            </div>
        </div>

        <button id="shareBtn">Protect & Share</button>

        <div id="links" class="links">
            <div class="link-group">
                <label>Browser Link</label>
                <div class="input-row">
                    <input type="text" id="browserLink" readonly>
                    <button onclick="copyToClipboard('browserLink')">Copy</button>
                </div>
            </div>
            <div class="link-group">
                <label>Terminal / API Endpoint</label>
                <div class="input-row">
                    <input type="text" id="rawLink" readonly>
                    <button onclick="copyToClipboard('rawLink')">Copy</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>

</html>
